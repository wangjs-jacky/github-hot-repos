name: Collect GitHub Trending

on:
  workflow_dispatch:
    inputs:
      mode:
        description: 'Collection mode'
        required: false
        default: 'daily'
        type: choice
        options:
          - daily
          - batch
          - full
      language:
        description: 'Language filter (empty for all)'
        required: false
        default: ''
        type: string
  schedule:
    - cron: '0 0 * * *'

permissions:
  contents: write

env:
  COLLECT_MODE: ${{ github.event.inputs.mode || 'daily' }}
  LANGUAGE_FILTER: ${{ github.event.inputs.language || '' }}

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Collect trending data
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Mode: $COLLECT_MODE"
          echo "Language: ${LANGUAGE_FILTER:-all}"

          if [ "$COLLECT_MODE" = "batch" ]; then
            if [ -n "$LANGUAGE_FILTER" ]; then
              node scripts/collect.mjs --batch -l "$LANGUAGE_FILTER"
            else
              node scripts/collect.mjs --batch
            fi
          elif [ "$COLLECT_MODE" = "full" ]; then
            if [ -n "$LANGUAGE_FILTER" ]; then
              node scripts/collect.mjs -l "$LANGUAGE_FILTER" --max-pages 10
            else
              node scripts/collect.mjs --max-pages 10
            fi
          else
            if [ -n "$LANGUAGE_FILTER" ]; then
              node scripts/collect.mjs -l "$LANGUAGE_FILTER" --max-pages 6
            else
              node scripts/collect.mjs --max-pages 6
            fi
          fi

      - name: Process with AI
        env:
          QWEN_API_KEY: ${{ secrets.QWEN_API_KEY }}
        run: node scripts/process.mjs

      - name: Generate summary
        id: summary
        run: |
          TOTAL=$(ls -d trending/*/ 2>/dev/null | wc -l)
          TODAY=$(find trending -name "README.md" -newer output/trending.json 2>/dev/null | wc -l || echo "0")
          echo "total=$TOTAL" >> $GITHUB_OUTPUT
          echo "today=$TODAY" >> $GITHUB_OUTPUT
          echo "Total repos: $TOTAL"
          echo "Processed today: $TODAY"

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A

          if git diff --staged --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          COMMIT_DATE=$(date +%Y-%m-%d)
          git commit -m "chore: update trending data $COMMIT_DATE" -m "Total: ${{ steps.summary.outputs.total }}" -m "Today: ${{ steps.summary.outputs.today }}" -m "Mode: ${{ env.COLLECT_MODE }}"
          git push

      - name: Summary
        run: |
          echo "## Collection Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Metric | Count |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Total repos | ${{ steps.summary.outputs.total }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Processed today | ${{ steps.summary.outputs.today }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Mode | ${{ env.COLLECT_MODE }} |" >> $GITHUB_STEP_SUMMARY
